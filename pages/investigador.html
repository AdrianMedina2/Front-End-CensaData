<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigador - CensaData</title>
    <link rel="icon" type="image/png" href="img/Censadata.ico">
    <!-- Boostrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Boostrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Fuente Poppins desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Estilos Propios -->
    <link href="../css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-brand py-3 px-5">
        <div class="container-fluid">
            <!-- Logo -->
            <a class="navbar-brand text-white fs-3" href="../index.html">
                <i class="bi bi-clipboard-check me-2"></i>
                <span class="fw-bold">Censa</span>Data
            </a>

            <!-- Botón hamburguesa -->
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Contenido colapsable -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex ms-auto align-items-center">
                    <!-- Aquí se inyecta el dropdown del usuario -->
                    <div id="userDropdown"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main>
        <div class="container my-5">
            <h2 class="fw-bold color-brand mb-4">Panel del Investigador</h2>
            <div class="row">
                <!-- Acceso a encuesta -->
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm hover-lift fade-in h-100 text-center">
                        <div class="card-body">
                            <i class="bi bi-clipboard-data fs-1 color-brand"></i>
                            <h5 class="fw-bold mt-3">Encuesta</h5>
                            <p class="small">Accede al formulario para registrar la información censal.</p>

                            <div class="mb-3">
                            <label for="institucion" class="form-label fw-bold">Institución</label>
                            <select id="institucion" class="form-select">
                                <option value="">Selecciona institución</option>
                                <option value="inide">INIDE</option>
                                <option value="mined">MINED</option>
                            </select>
                            </div>

                            <a href="#" class="btn btn-brand-light fw-bold">Iniciar encuesta</a>
                        </div>
                    </div>
                </div>

                <!-- Guías rápidas -->
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm hover-lift fade-in h-100 text-center">
                        <div class="card-body d-flex flex-column justify-content-center">
                            <i class="bi bi-book fs-1 color-brand"></i>
                            <h5 class="fw-bold mt-3">Guías rápidas</h5>
                            <p class="small">Consulta manuales y preguntas frecuentes para resolver dudas.</p>
                            <a href="#" class="btn btn-brand-light fw-bold">Ver guías</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Boostrap JS Bundle desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Scripts Propios -->
    <script src="../js/app.js"></script>
</body>

</html>

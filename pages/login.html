<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CensaData</title>
    <!-- Boostrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Fuente Poppins desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Estilos Propios -->
    <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-brand py-3 px-5">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold fs-3" href="index.html">CensaData</a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex ms-auto flex-lg-row flex-column align-items-center justify-content-center">
                    <a class="nav-link text-white mb-2 mb-lg-0 me-lg-3" href="../index.html">Inicio</a>
                    <a class="nav-link text-white mb-2 mb-lg-0 me-lg-3" href="/acerca.html">Acerca de nosotros</a>
                    <a href="login.html" class="btn btn-brand-light fw-bold rounded-pill">Iniciar sesión</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
            <h3 class="color-brand text-center mb-4 fw-bold">Iniciar sesión</h3>
            <form>
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">Tipo de usuario</label>
                    <select class="form-select" id="role">
                        <option value="investigador">Investigador</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-brand text-white w-100 fw-bold rounded-pill mt-2">Acceder</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
